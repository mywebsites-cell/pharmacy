name: Build & Release Desktop App

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Build Windows installer
        working-directory: apps/desktop
        run: npm run build:win

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.21
          name: "v1.0.21 - Owner-Mediated Staff Activation & Subscription Lockout"
          body: |
            ### Medicly Desktop v1.0.21 Release
            - **Owner-Mediated Staff Activation**: Pharmacy Owner enters staff's 6-digit OTP code and sets account credentials.
            - **Subscription-Gated Staff Access**: Staff accounts are automatically locked when subscription expires and unlocked upon renewal.
            - **Cloud-First Architecture**: High performance direct cloud API sync.
          files: |
            apps/desktop/release/Medicly-setup-1.0.21.exe
            apps/desktop/release/latest.yml
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer as artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: Medicly-Windows-Installer
          path: apps/desktop/release/*.exe
          retention-days: 30
